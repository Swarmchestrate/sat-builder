# Docker Compose configuration for SAT Builder
# Swarmchestrate Application Template Builder
# Runs the SAT Builder API service from the published Docker image
#
# Image configuration:
#   DOCKER_NAMESPACE defaults to "uowcpc"
#   SAT_BUILDER_VERSION defaults to "latest"
#
# Examples:
#   docker compose up -d
#   DOCKER_NAMESPACE=uowcpc SAT_BUILDER_VERSION=1.0.0 docker compose up -d
#   DOCKER_NAMESPACE=my-user SAT_BUILDER_VERSION=dev docker compose up -d

services:
  sat-builder:
    # Main SAT Builder API service
    image: ${DOCKER_NAMESPACE:-uowcpc}/sat-builder:${SAT_BUILDER_VERSION:-latest}

    # Fixed container name for easier local/deployment management
    container_name: sat-builder

    # Expose the API port
    # Host port can be overridden with API_PORT, defaults to 8000
    ports:
      - "${API_PORT:-8000}:8000"

    # Persist application logs on the host machine
    # Container workdir is /sat-builder
    volumes:
      - ./logs:/sat-builder/logs

    # Restart the service unless it is explicitly stopped
    restart: unless-stopped

    # Health check endpoint
    # Verifies that the API is responding correctly
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Attach service to the SAT Builder network
    networks:
      - sat-builder-network

# Network definition
# Kept explicit so future services, such as a frontend, can join the same network
networks:
  sat-builder-network:
    name: sat-builder-network
    driver: bridge