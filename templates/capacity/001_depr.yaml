{%- macro render_property(prop_value) -%}
{%- if prop_value is iterable and prop_value is not string -%}
[
          {%- for item in prop_value -%}
          '{{ item }}'{% if not loop.last %}, {% endif %}
          {%- endfor -%}
        ]
{%- else -%}
{{ prop_value }}
{%- endif -%}
{%- endmacro -%}

{%- macro render_node_filter(node_filter, base_indent) -%}
{%- set indent = ' ' * base_indent %}
{{ indent }}node_filter:
{{ indent }}  $and:
{%- for condition in node_filter['$and'] %}
{%- for operator, operands in condition.items() %}
{{ indent }}    - {{ operator }}:
{%- for operand in operands %}
{%- if operand is mapping and '$get_property' in operand %}
{{ indent }}        - $get_property: [ {{ operand['$get_property']|join(', ') }} ]
{%- else %}
{{ indent }}        - {{ operand }}
{%- endif %}
{%- endfor %}
{%- endfor %}
{%- endfor %}
{%- endmacro -%}

tosca_definitions_version: {{ definitions_version }}

description: {{ description }}

imports:
- namespace: {{ imports[0]['namespace'] }}
  profile: {{ imports[0].profile }}

service_template:

  node_templates:
{%- for node_name, node_config in service_template.node_templates.items() %}

    {{ node_name }}:
{%- if ':' in node_config.type %}
      type: {{ imports[0]['namespace'] }}:{{ node_config.type.split(':')[1] }}
{%- else %}
      type: {{ imports[0]['namespace'] }}:{{ node_config.type }}
{%- endif %}

{%- if node_config.directives %}
      directives:
{%- for directive in node_config.directives %}
      - {{ directive }}
{%- endfor %}
{%- endif %}

{%- if node_config.properties %}
      properties:
{%- for prop_key, prop_value in node_config.properties.items() %}
        {{ prop_key }}: {{ render_property(prop_value) }}
{%- endfor %}
{%- endif %}

{%- if node_config.requirements %}
      requirements:
{%- for req in node_config.requirements %}
{%- for req_key, req_value in req.items() %}
      - {{ req_key }}:
{%- if req_value is mapping and 'node_filter' in req_value -%}
{{ render_node_filter(req_value.node_filter, base_indent=10) }}
{%- endif %}
{%- endfor %}
{%- endfor %}
{%- endif %}
{%- endfor %}